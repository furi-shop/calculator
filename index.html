<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芙理日本代購計算</title>
    <style>
        a { color: #4CAF50; text-decoration: none; }
        a:hover { color: #388E3C; text-decoration: underline; }
        body { font-family: Arial, sans-serif; margin: 10px; }
        .container { max-width: 900px; margin: 0 auto; }
        .form-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: nowrap; }
        .form-group > div { flex: 1 1 30%; min-width: 0; }
        .form-group .long { flex: 2 1 35%; }
        label { display: block; margin: 10px 0 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: red; }
        .warning { margin-top: 20px; color: #000000; }
        .example { margin-top: 30px; background-color: #f9f9f9; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        footer { margin-top: 50px; text-align: center; font-size: 0.9em; color: #555; }
        h1 { display: flex; align-items: center; gap: 10px; font-size: 2em; }
        h1 a { text-decoration: none; color: #4CAF50; }
        h1 i { font-size: 0.9em; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h1>
    芙理日本代購計算
    <a href="https://www.facebook.com/furi.shopping" target="_blank">
        <i class="fab fa-facebook"></i>
    </a>
    <a href="https://line.me/ti/g2/VZdlTAmbMHDaWFsmN0U8k-5Wo1wxPgoP5bsfGA?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank">
        <i class="fab fa-line"></i>
    </a>
    <a href="https://www.threads.net/@furi.shopping" target="_blank">
        <i class="fa-brands fa-threads"></i>
    </a>
</h1>
    <div id="product-container">
        <div class="form-group">
            <div class="long">
                <label>單件商品(¥):</label>
                <input type="number" name="originalPrice" placeholder="日幣價格" required>
            </div>
            <div class="long">
                <label>打折活動(可略):</label>
                <input type="number" name="discount" placeholder="3折填0.3">
            </div>
            <div>
                <label>商品狀態:</label> 
                <select name="itemType" required>
                    <option value="inStock">現貨</option>
                    <option value="cosmetic">彩妝類</option>
                    <option value="saleSeason">折扣季特殊計價</option>
                    <option value="pium">Pium轉發分享優惠匯率</option>
                </select>
            </div>
        </div>
    </div>

    <button onclick="addProductRow()">增加商品</button>
    <button onclick="calculateFinalPrice()">計算($)</button>

    <div class="result" id="finalPrice"></div>

    <div class="warning">
        <p>1. 如欲購買複數商品，可按"增加商品"按鈕增加欄位。</p>
        <p>2. 委託方式: 私訊<a href="https://www.facebook.com/furi.shopping" target="_blank">芙理日本代購</a>。</p>
        <p>3. 委託即代表已知悉同意<a href="https://furi-shop.github.io/rules/" target="_blank">委託規則</a>。</p>
    </div>
</div>

<footer>
    <p>此服務由 <a href="https://www.facebook.com/furi.shopping" target="_blank">芙理日本代購</a> 提供</p>
</footer>
<script src="script.js"></script>
</body>
</html>
