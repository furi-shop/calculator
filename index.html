<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>芙理日本代購計算</title>
    <style>
        a { color: #4CAF50; text-decoration: none; }
        a:hover { color: #388E3C; text-decoration: underline; }
        body { font-family: Arial, sans-serif; margin: 10px; }
        .container { max-width: 900px; margin: 0 auto; }
        .form-group { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: nowrap; }
        .form-group > div { flex: 1 1 30%; min-width: 0; }
        .form-group .long { flex: 2 1 35%; }
        label { display: block; margin: 10px 0 5px; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; }
        button { padding: 10px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 10px; }
        button:hover { background-color: #45a049; }
        .result { margin-top: 20px; font-size: 1.2em; font-weight: bold; color: red; }
        .warning { margin-top: 20px; color: #000000; }
        .example { margin-top: 30px; background-color: #f9f9f9; padding: 20px; border: 1px solid #ccc; border-radius: 5px; }
        footer { margin-top: 50px; text-align: center; font-size: 0.9em; color: #555; }
        h1 { display: flex; align-items: center; gap: 10px; font-size: 2em; }
        h1 a { text-decoration: none; color: #4CAF50; }
        h1 i { font-size: 0.9em; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <h1>
        芙理日本代購計算
        <a href="https://www.facebook.com/furi.shopping" target="_blank"><i class="fab fa-facebook"></i></a>
        <a href="https://line.me/ti/g2/VZdlTAmbMHDaWFsmN0U8k-5Wo1wxPgoP5bsfGA" target="_blank"><i class="fab fa-line"></i></a>
    </h1>
    
    <div id="product-container">
        <div class="form-group">
            <div class="long">
                <label>單件商品(¥):</label>
                <input type="number" name="originalPrice" placeholder="日幣價格" required>
            </div>
            <div class="long">
                <label>打折活動(可略):</label>
                <input type="number" name="discount" placeholder="3折填0.3">
            </div>
            <div>
                <label>商品狀態:</label> 
                <select name="itemType" required>
                    <option value="inStock">現貨</option>
                    <option value="cosmetic">彩妝類</option>
                    <option value="saleSeason">折扣季特殊計價</option>
                    <option value="pium">Pium轉發分享優惠匯率</option>
                </select>
            </div>
        </div>
    </div>

    <button onclick="addProductRow()">增加商品</button>
    <button onclick="calculateFinalPrice()">計算($)</button>

    <div class="result" id="finalPrice"></div>

    <div class="warning">
        <p>1. 如欲購買複數商品，可按"增加商品"按鈕增加欄位。</p>
        <p>2. 委託方式: 私訊<a href="https://www.facebook.com/furi.shopping" target="_blank">芙理日本代購</a>。</p>
        <p>3. 委託即代表已知悉同意<a href="https://furi-shop.github.io/rules/" target="_blank">委託規則</a>。</p>
    </div>
</div>

<footer>
    <p>此服務由 <a href="https://www.facebook.com/furi.shopping" target="_blank">芙理日本代購</a> 提供</p>
</footer>
<script>
    function addProductRow() {
        const productContainer = document.getElementById('product-container');
        const newGroup = document.createElement('div');
        newGroup.className = 'form-group';
        newGroup.innerHTML = `
            <div class="long"><input type="number" name="originalPrice" placeholder="日幣價格" required></div>
            <div class="long"><input type="number" name="discount" placeholder="3折填0.3"></div>
            <div>
                <select name="itemType" required>
                    <option value="inStock">現貨</option>
                    <option value="cosmetic">彩妝類</option>
                    <option value="saleSeason">折扣季特殊計價</option>
                    <option value="pium">Pium轉發分享優惠匯率</option>
                </select>
            </div>`;
        productContainer.appendChild(newGroup);
    }

    function calculateFinalPrice() {
        const products = document.querySelectorAll('.form-group');
        let totalCost = 0;
        let costSubjectToServiceFee = 0; // Track items that require the 1.05% fee
        const real_exchangeRate = 0.235;

        products.forEach(group => {
            const originalPrice = parseFloat(group.querySelector('input[name="originalPrice"]').value);
            const discount = parseFloat(group.querySelector('input[name="discount"]').value) || 1;
            const itemType = group.querySelector('select[name="itemType"]').value;
            
            if (isNaN(originalPrice) || originalPrice <= 0) return;

            const finalPriceInYen = Math.ceil(originalPrice * discount);
            let exchangeRate;
            let additionalFee = 0;
            let skipMinCheck = false;
            let skipServiceFee = false;

            // 1. Logic for Cosmetic and Pium
            if (itemType === "cosmetic") {
                exchangeRate = 0.26;
                additionalFee = 50;
                skipMinCheck = true;
                skipServiceFee = true;
            } else if (itemType === "pium") {
                exchangeRate = 0.22;
                additionalFee = 0;
                skipMinCheck = true;
                skipServiceFee = true;
            } else {
                // Default logic for inStock and saleSeason
                if (finalPriceInYen <= 2000) {
                    exchangeRate = 0.3;
                } else if (finalPriceInYen <= 6000) {
                    exchangeRate = 0.25;
                    additionalFee = 45;
                } else {
                    exchangeRate = 0.25;
                    additionalFee = 35;
                }
            }

            // 2. Base TWD Calculation
            let finalPriceInDollars = Math.ceil(finalPriceInYen * exchangeRate + additionalFee);

            // 3. Profit Buffer Logic
            if (itemType === "saleSeason") {
                if (finalPriceInDollars - finalPriceInYen * real_exchangeRate < 150) {
                    finalPriceInDollars = Math.ceil(finalPriceInYen * real_exchangeRate) + 150;
                } else {
                    finalPriceInDollars = Math.ceil(finalPriceInYen * 0.255);
                }
            } else if (!skipMinCheck) {
                if (finalPriceInDollars - finalPriceInYen * real_exchangeRate < 100) {
                    finalPriceInDollars = Math.ceil(finalPriceInYen * real_exchangeRate) + 100;
                }
            }

            totalCost += finalPriceInDollars;
            
            // Only add to fee base if it's NOT cosmetic or pium
            if (!skipServiceFee) {
                costSubjectToServiceFee += finalPriceInDollars;
            }
        });
        
        // 4. Service Fee Calculation
        let serviceFee = 0;
        if (costSubjectToServiceFee > 0) {
            serviceFee = Math.ceil(costSubjectToServiceFee * 0.0105);
            if (serviceFee < 15) {
                serviceFee = 15;
            }
        }
        
        const totalWithFee = totalCost + serviceFee;

        const resultDiv = document.getElementById("finalPrice");
        if (totalCost <= 0) {
            resultDiv.innerHTML = "請輸入商品日幣價格 (¥)";
        } else {
            resultDiv.innerHTML = "預估價格為台幣: $" + totalWithFee + " + 二補國際運費";
        }
    }
</script>
</body>
</html>
